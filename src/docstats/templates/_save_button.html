{% if is_saved %}
  <button class="btn btn-secondary btn-sm"
          hx-delete="/provider/{{ npi }}/save"
          hx-target="#save-btn"
          hx-swap="outerHTML">✓ Saved (Remove)</button>
{% else %}
  <button class="btn btn-primary btn-sm"
          hx-post="/provider/{{ npi }}/save"
          hx-target="#save-btn"
          hx-swap="outerHTML">+ Save Provider</button>
{% endif %}

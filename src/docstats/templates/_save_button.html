{% if is_saved %}
<button
    hx-delete="/provider/{{ npi }}/save"
    hx-target="#save-btn"
    hx-swap="innerHTML"
    class="secondary"
>Saved (Remove)</button>
{% else %}
<button
    hx-post="/provider/{{ npi }}/save"
    hx-target="#save-btn"
    hx-swap="innerHTML"
>Save Provider</button>
{% endif %}

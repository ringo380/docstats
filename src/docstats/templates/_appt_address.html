<div class="appt-address-wrap" id="appt-{{ npi }}">
  {% if appt_address %}
    <div class="appt-chip">
      📍 {{ appt_address }}{% if appt_suite %} · {{ appt_suite }}{% endif %}
      <button
        hx-delete="/provider/{{ npi }}/appt-address"
        hx-target="#appt-{{ npi }}"
        hx-swap="outerHTML"
        title="Remove appointment address">✕</button>
    </div>
    <form class="appt-suite-row"
          hx-put="/provider/{{ npi }}/appt-suite"
          hx-target="#appt-{{ npi }}"
          hx-swap="outerHTML"
          style="display:flex; gap:4px; margin-top:4px; align-items:center;">
      <input type="text" name="suite" value="{{ appt_suite or '' }}"
             placeholder="Suite, Rm, Office #…"
             style="font-size:0.75rem; width:140px; padding:2px 6px;">
      <button type="submit" class="btn btn-secondary btn-sm"
              style="font-size:0.7rem; padding:2px 8px;">
        {% if appt_suite %}Update{% else %}Add{% endif %}
      </button>
    </form>
  {% else %}
    {% if mapbox_token %}
      <div class="appt-input-row">
        <span style="color: var(--text-dim); font-size: 0.9rem;">📍</span>
        <input
          type="text"
          id="mapbox-appt-{{ npi }}"
          placeholder="Appointment address (if different)…"
          autocomplete="off"
          hx-post="/provider/{{ npi }}/appt-address"
          hx-trigger="mapbox-select"
          hx-target="#appt-{{ npi }}"
          hx-swap="outerHTML"
          hx-include="[name='address'][data-npi='{{ npi }}']"
          style="font-size:0.8rem;"
        >
        <input type="hidden" name="address" data-npi="{{ npi }}" id="appt-val-{{ npi }}" value="">
        <ul id="appt-sugg-{{ npi }}" class="suggestions-list" style="display:none; top:36px;"></ul>
      </div>
      <script>
        (function() {
          var MAPBOX_TOKEN = {{ mapbox_token | tojson }};
          var input = document.getElementById('mapbox-appt-{{ npi }}');
          var list = document.getElementById('appt-sugg-{{ npi }}');
          var hidden = document.getElementById('appt-val-{{ npi }}');
          if (!input || !MAPBOX_TOKEN) return;
          var t;
          input.addEventListener('input', function() {
            clearTimeout(t);
            var q = input.value.trim();
            if (q.length < 3) { list.style.display='none'; return; }
            t = setTimeout(function() {
              fetch('https://api.mapbox.com/geocoding/v5/mapbox.places/' +
                encodeURIComponent(q) + '.json?country=US&types=address,place,postcode&access_token=' + MAPBOX_TOKEN)
              .then(function(r){return r.json();}).then(function(data){
                list.innerHTML = '';
                if (!data.features||!data.features.length){list.style.display='none';return;}
                data.features.forEach(function(f){
                  var li = document.createElement('li');
                  li.textContent = f.place_name;
                  li.addEventListener('click', function(){
                    input.value = f.place_name;
                    hidden.value = f.place_name;
                    list.style.display = 'none';
                    htmx.trigger(input, 'mapbox-select');
                  });
                  list.appendChild(li);
                });
                list.style.display = 'block';
              });
            }, 300);
          });
          document.addEventListener('click', function(e){
            if(!input.contains(e.target)) list.style.display='none';
          });
        })();
      </script>
    {% else %}
      <form
        hx-post="/provider/{{ npi }}/appt-address"
        hx-target="#appt-{{ npi }}"
        hx-swap="outerHTML"
        style="display:flex; gap:6px; margin-top:4px;"
      >
        <input
          type="text"
          name="address"
          placeholder="Appointment address (if different)…"
          style="font-size:0.8rem;"
          autocomplete="off"
        >
        <button type="submit" class="btn btn-secondary btn-sm">Save</button>
      </form>
    {% endif %}
  {% endif %}
</div>

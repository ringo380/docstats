<div id="support-access-section">
{% if active_grant %}
  <p style="font-size:0.88rem; color:var(--text-muted); margin-bottom:0.6rem;">
    Staff access is <strong style="color:var(--green, #16a34a);">active</strong> until
    <strong>{{ active_grant.expires_at.strftime('%b %d, %Y at %H:%M UTC') }}</strong>.
  </p>
  <button
    hx-delete="/profile/support-access"
    hx-target="#support-access-section"
    hx-swap="outerHTML"
    class="btn btn-secondary"
    style="font-size:0.82rem; padding:6px 14px; color:var(--red); border-color:var(--red);">
    Revoke access
  </button>
{% else %}
  <p style="font-size:0.88rem; color:var(--text-muted); margin-bottom:0.6rem;">
    Staff cannot view your account data. Grant temporary access if you need support.
  </p>
  <form hx-post="/profile/support-access"
        hx-target="#support-access-section"
        hx-swap="outerHTML"
        style="display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap;">
    <select name="ttl_seconds" style="font-size:0.82rem; padding:5px 8px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface); color:var(--text);">
      {% for label, seconds in ttl_options.items() %}
      <option value="{{ seconds }}"{% if seconds == 86400 %} selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
    <button type="submit" class="btn btn-secondary" style="font-size:0.82rem; padding:6px 14px;">
      Grant staff access
    </button>
  </form>
{% endif %}
</div>

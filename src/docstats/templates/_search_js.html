{# Shared search JS: constants, parseQuery, renderChips, toggleLocation, Mapbox, geolocation #}
<script>
  var MAPBOX_TOKEN = {{ mapbox_token | tojson }};
  var parseDebounce;
  var locationDebounce;

  // ── Parsing constants ────────────────────────────────────────────────────
  var HONORIFICS = ['dr.', 'dr', 'doctor', 'doc', 'prof.', 'prof', 'professor'];
  var CREDENTIALS = ['md', 'm.d.', 'do', 'd.o.', 'phd', 'ph.d.', 'dds', 'dvm',
    'np', 'pa', 'pa-c', 'rn', 'aprn', 'cnp', 'facp', 'facs', 'facog', 'faad',
    'mph', 'ms', 'dnp'];
  // Tokens that are credentials but also common names — keep as name in chips
  var AMBIGUOUS_CREDS = ['do', 'kim', 'may', 'lee'];
  var SPECIALTIES = [
    ['internal medicine','Internal Medicine'],['family medicine','Family Medicine'],
    ['family practice','Family Medicine'],['orthopedic surgery','Orthopedic Surgery'],
    ['general surgery','General Surgery'],['infectious disease','Infectious Disease'],
    ['physical therapy','Physical Therapy'],['occupational therapy','Occupational Therapy'],
    ['hematology oncology','Hematology & Oncology'],['allergy immunology','Allergy & Immunology'],
    ['pulmonary disease','Pulmonary Disease'],['sports medicine','Sports Medicine'],
    ['sleep medicine','Sleep Medicine'],['pain management','Pain Management'],
    ['obstetrics gynecology','Obstetrics & Gynecology'],['ob gyn','Obstetrics & Gynecology'],
    ['cardiology','Cardiology'],['cardiologist','Cardiology'],
    ['neurology','Neurology'],['neurologist','Neurology'],
    ['orthopedics','Orthopedic Surgery'],['orthopedic','Orthopedic Surgery'],['ortho','Orthopedic Surgery'],
    ['pediatrics','Pediatrics'],['pediatrician','Pediatrics'],
    ['dermatology','Dermatology'],['dermatologist','Dermatology'],
    ['psychiatry','Psychiatry'],['psychiatrist','Psychiatry'],['psych','Psychiatry'],
    ['oncology','Hematology & Oncology'],['oncologist','Hematology & Oncology'],
    ['endocrinology','Endocrinology'],['gastroenterology','Gastroenterology'],
    ['ophthalmology','Ophthalmology'],['urology','Urology'],['urologist','Urology'],
    ['pulmonology','Pulmonology'],['rheumatology','Rheumatology'],
    ['allergist','Allergy & Immunology'],['radiology','Radiology'],
    ['anesthesiology','Anesthesiology'],['nephrology','Nephrology'],
    ['podiatry','Podiatry'],['optometry','Optometry'],['chiropractic','Chiropractic'],
    ['internist','Internal Medicine'],['obgyn','Obstetrics & Gynecology'],
    ['gi','Gastroenterology'],
  ];
  var ORG_SIGNALS = ['hospital','clinic','medical center','health system','urgent care',
    'institute','associates','group','llc','inc','corporation','foundation',
    'kaiser','sutter','ucsf','stanford','cedars'];

  // ── Parse helpers ────────────────────────────────────────────────────────
  function normalizeText(s) {
    return s.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=_`~()]/g,' ').replace(/\s+/g,' ').trim();
  }

  function clearChildren(el) {
    while (el.firstChild) el.removeChild(el.firstChild);
  }

  function parseQuery(raw) {
    if (!raw.trim()) return {firstName:'',lastName:'',specialty:'',honorific:'',credentials:[],isOrg:false};
    var text = normalizeText(raw);

    for (var i = 0; i < ORG_SIGNALS.length; i++) {
      if (text.includes(ORG_SIGNALS[i])) return {isOrg:true, orgName:raw.trim(), firstName:'',lastName:'',specialty:'',honorific:'',credentials:[]};
    }

    var tokens = text.split(' ');
    var honorific = '';
    if (tokens.length > 0 && HONORIFICS.indexOf(tokens[0]) !== -1) {
      honorific = tokens[0].replace('.','');
      tokens = tokens.slice(1);
    }

    var credentials = [];
    var remaining = [];
    for (var i = 0; i < tokens.length; i++) {
      var tok = tokens[i].replace(/\./g,'');
      if (CREDENTIALS.indexOf(tok) !== -1 && AMBIGUOUS_CREDS.indexOf(tok) === -1) {
        credentials.push(tok.toUpperCase());
      } else {
        remaining.push(tokens[i]);
      }
    }
    tokens = remaining;

    var specialty = '';
    var joined = tokens.join(' ');
    for (var i = 0; i < SPECIALTIES.length; i++) {
      var key = SPECIALTIES[i][0], label = SPECIALTIES[i][1];
      if (key.indexOf(' ') !== -1 && joined.includes(key)) {
        specialty = label;
        joined = joined.replace(key,'').replace(/\s+/g,' ').trim();
        tokens = joined.split(' ').filter(Boolean);
        break;
      }
    }
    if (!specialty) {
      var nameTokens = [];
      for (var i = 0; i < tokens.length; i++) {
        var matched = false;
        for (var j = 0; j < SPECIALTIES.length; j++) {
          if (SPECIALTIES[j][0].indexOf(' ') === -1 && tokens[i] === SPECIALTIES[j][0]) {
            specialty = SPECIALTIES[j][1]; matched = true; break;
          }
        }
        if (!matched) nameTokens.push(tokens[i]);
      }
      tokens = nameTokens;
    }

    tokens = tokens.filter(Boolean);
    var firstName = '', lastName = '', middleName = '';
    if (tokens.length === 1) { lastName = tokens[0]; }
    else if (tokens.length === 2) { firstName = tokens[0]; lastName = tokens[1]; }
    else if (tokens.length >= 3) {
      firstName = tokens[0];
      lastName = tokens[tokens.length - 1];
      middleName = tokens.slice(1, tokens.length - 1).join(' ');
    }

    return {firstName:firstName, lastName:lastName, middleName:middleName, specialty:specialty, honorific:honorific, credentials:credentials, isOrg:false};
  }

  // ── Chip rendering ───────────────────────────────────────────────────────
  function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

  function makeChip(cssClass, labelText, valueText) {
    var span = document.createElement('span');
    span.className = 'chip ' + cssClass;
    var labelEl = document.createElement('span');
    labelEl.className = 'chip-label';
    labelEl.textContent = labelText;
    span.appendChild(labelEl);
    span.appendChild(document.createTextNode(' ' + valueText));
    return span;
  }

  function renderChips(parsed) {
    var el = document.getElementById('parse-chips');
    if (!el) return;
    clearChildren(el);
    if (!parsed.firstName && !parsed.lastName && !parsed.specialty && !parsed.honorific && !parsed.credentials.length) return;
    if (parsed.isOrg) {
      el.appendChild(makeChip('chip-cred', 'org', parsed.orgName));
      return;
    }
    if (parsed.honorific) el.appendChild(makeChip('chip-cred', 'title', parsed.honorific.toUpperCase()));
    if (parsed.firstName) el.appendChild(makeChip('chip-name', 'first', cap(parsed.firstName)));
    if (parsed.middleName) {
      // Show first initial only — NPPES has no middle name param; used for ranking only
      var initial = parsed.middleName.charAt(0).toUpperCase() + '.';
      el.appendChild(makeChip('chip-name', 'middle', initial));
    }
    if (parsed.lastName) el.appendChild(makeChip('chip-name', 'last', cap(parsed.lastName)));
    if (parsed.specialty) el.appendChild(makeChip('chip-specialty', 'specialty', parsed.specialty));
    for (var i = 0; i < parsed.credentials.length; i++) {
      el.appendChild(makeChip('chip-cred', 'credential', parsed.credentials[i]));
    }
  }

  // ── Location filter ──────────────────────────────────────────────────────
  function toggleLocation() {
    var pill = document.getElementById('pill-location');
    var fields = document.getElementById('location-fields');
    var shown = fields.style.display !== 'none';
    fields.style.display = shown ? 'none' : 'block';
    pill.classList.toggle('active', !shown);
    if (shown) {
      document.getElementById('field-city').value = '';
      document.getElementById('field-state').value = '';
      document.getElementById('field-zip').value = '';
    }
  }

  {% if mapbox_token %}
  // ── Mapbox location autocomplete ──────────────────────────────────────────
  var _locationDocClickBound = false;
  function initLocationAutocomplete() {
    var input = document.getElementById('location-input');
    var list = document.getElementById('location-suggestions');
    if (!input || !list) return;

    input.addEventListener('input', function() {
      clearTimeout(locationDebounce);
      var q = input.value.trim();
      if (q.length < 3) { list.style.display = 'none'; return; }
      locationDebounce = setTimeout(function() {
        var url = 'https://api.mapbox.com/geocoding/v5/mapbox.places/' +
          encodeURIComponent(q) + '.json?country=US&types=place,postcode&access_token=' + MAPBOX_TOKEN;
        fetch(url).then(function(r) { return r.json(); }).then(function(data) {
          clearChildren(list);
          if (!data.features || !data.features.length) { list.style.display = 'none'; return; }
          data.features.forEach(function(f) {
            var li = document.createElement('li');
            li.textContent = f.place_name;
            li.addEventListener('click', function() {
              input.value = f.place_name;
              list.style.display = 'none';
              var zip = '', city = '', state = '';
              if (f.place_type && f.place_type[0] === 'postcode') { zip = f.text; }
              if (f.place_type && f.place_type[0] === 'place') { city = f.text; }
              (f.context || []).forEach(function(c) {
                if (c.id.startsWith('place.')) city = c.text;
                if (c.id.startsWith('region.')) state = c.short_code ? c.short_code.replace('US-','') : '';
                if (c.id.startsWith('postcode.') && !zip) zip = c.text;
              });
              document.getElementById('field-city').value = city;
              document.getElementById('field-state').value = state;
              document.getElementById('field-zip').value = zip;
            });
            list.appendChild(li);
          });
          list.style.display = 'block';
        });
      }, 300);
    });

    if (!_locationDocClickBound) {
      _locationDocClickBound = true;
      document.addEventListener('click', function(e) {
        var inp = document.getElementById('location-input');
        var lst = document.getElementById('location-suggestions');
        if (inp && lst && !inp.contains(e.target) && !lst.contains(e.target)) lst.style.display = 'none';
      });
    }
  }
  initLocationAutocomplete();
  {% endif %}

  // ── Geo-ready callback system ─────────────────────────────────────────────
  var _geoReady = false;
  var _geoReadyCallbacks = [];
  function onGeoReady(fn) {
    if (_geoReady) { fn(); return; }
    _geoReadyCallbacks.push(fn);
  }
  function _fireGeoReady() {
    if (_geoReady) return;
    _geoReady = true;
    for (var i = 0; i < _geoReadyCallbacks.length; i++) _geoReadyCallbacks[i]();
    _geoReadyCallbacks = [];
  }

  // ── Browser geolocation → auto state/lat/lon ──────────────────────────────
  var _detectedGeoState = '';
  var _detectedGeoLat = '';
  var _detectedGeoLon = '';
  function _setGeoFields() {
    var f;
    if (_detectedGeoState) { f = document.getElementById('field-geo-state'); if (f && !f.value) f.value = _detectedGeoState; }
    if (_detectedGeoLat) { f = document.getElementById('field-geo-lat'); if (f && !f.value) f.value = _detectedGeoLat; }
    if (_detectedGeoLon) { f = document.getElementById('field-geo-lon'); if (f && !f.value) f.value = _detectedGeoLon; }
  }
  function initGeolocation() {
    if (!navigator.geolocation || !MAPBOX_TOKEN) { _fireGeoReady(); return; }
    if (_detectedGeoState) {
      _setGeoFields();
      _fireGeoReady();
      return;
    }
    navigator.geolocation.getCurrentPosition(function(pos) {
      var lat = pos.coords.latitude, lon = pos.coords.longitude;
      // Round to 2 decimals (~1km) to limit precision in logs/URLs
      _detectedGeoLat = '' + Math.round(lat * 100) / 100;
      _detectedGeoLon = '' + Math.round(lon * 100) / 100;
      var url = 'https://api.mapbox.com/geocoding/v5/mapbox.places/' +
        lon + ',' + lat + '.json?types=region&access_token=' + MAPBOX_TOKEN;
      fetch(url).then(function(r) { return r.json(); }).then(function(data) {
        if (!data.features || !data.features.length) { _setGeoFields(); _fireGeoReady(); return; }
        var stateCode = '';
        for (var i = 0; i < data.features.length; i++) {
          var f = data.features[i];
          if (f.place_type && f.place_type[0] === 'region' && !stateCode) {
            stateCode = f.properties && f.properties.short_code
              ? f.properties.short_code.replace('US-', '') : '';
          }
        }
        if (stateCode) _detectedGeoState = stateCode;
        _setGeoFields();
        _fireGeoReady();
      }).catch(function() { _setGeoFields(); _fireGeoReady(); });
    }, function() { _fireGeoReady(); }, { timeout: 5000 });
  }
  initGeolocation();
  setTimeout(function() { _setGeoFields(); _fireGeoReady(); }, 3000);
</script>

name: Deploy to Railway

# Belt-and-suspenders redeploy on push to main. The Railway GitHub App
# is SUPPOSED to auto-deploy, but webhook delivery has been intermittent
# (see tasks #2/#4 in docstats notes). This job guarantees every merge to
# main produces a deploy, even if the App's webhook drops the event.
#
# Requires a repo secret ``RAILWAY_TOKEN`` — a project-scoped token from
# https://railway.com/account/tokens. Scope to the ``docstats`` project.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: railway-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # Skip unless the token is configured — lets contributors fork without
    # breaking their CI. The Railway CLI needs RAILWAY_TOKEN to authenticate.
    if: github.repository == 'ringo380/docstats'
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: curl -fsSL https://railway.com/install.sh | sh
      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service docstats --ci
